apiVersion: kingdom.pal/v1alpha1
kind: AgentRegistry

metadata:
  name: essential-kingdom
  description: Source of truth for agents installed in Kingdom of PAL.

spec:
  environment:
    file: .env
    template: .env.example
    resolution: kingdom-root
    inheritedByAgents: true

  rules:
    coreRolesRequired: true
    coreImplementationsReplaceable: true
    extensionsRemovable: true
    preserveAuditHistoryOnRemoval: true
    archiveMemoryOnRemoval: true

  coreRoles:
    - community-coordinator
    - content-producer
    - security-governor
    - system-doctor

  agents:
    - id: orin
      displayName: Orin
      role: community-coordinator
      tier: core
      enabled: true
      removable: false
      replacementPolicy: compatible-agent-required
      source:
        repository: https://github.com/promptalchemistlabs/pal-agent-orin
        path: agents/orin
        version: 0.2.0
        revision: fa6788f4f023a30985cd8f179e070659a53ba83e
        manifest: https://raw.githubusercontent.com/promptalchemistlabs/pal-agent-orin/main/agent.yaml
      capabilities:
        - community-question-analysis
        - context-selection
        - workflow-routing
        - multi-agent-coordination
      permissions:
        - read:community-knowledge
        - read:shared-memory
        - write:workflow-tasks
        - write:shared-memory-summary
      contracts:
        accepts:
          - shared-contracts/task-request.schema.json
        returns:
          - shared-contracts/task-result.schema.json
      healthcheck:
        endpoint: /health
        required: true

    - id: scribe
      displayName: Scribe
      role: content-producer
      tier: core
      enabled: true
      removable: false
      replacementPolicy: compatible-agent-required
      source:
        repository: https://github.com/promptalchemistlabs/pal-agent-scribe
        path: agents/scribe
        version: 0.2.0
        revision: 6585981ac75c180e02d3e2ba0a52a1d865b17fd6
        manifest: https://raw.githubusercontent.com/promptalchemistlabs/pal-agent-scribe/main/agent.yaml
      capabilities:
        - long-form-content
        - content-remixing
        - website-copy
        - knowledge-organisation
      permissions:
        - read:approved-community-insights
        - read:brand-guidelines
        - write:content-drafts
        - write:shared-memory-summary
      contracts:
        accepts:
          - shared-contracts/task-request.schema.json
        returns:
          - shared-contracts/task-result.schema.json
      healthcheck:
        endpoint: /health
        required: true

    - id: rick
      displayName: Rick
      role: security-governor
      tier: core
      enabled: true
      removable: false
      replacementPolicy: compatible-agent-required
      source:
        repository: https://github.com/promptalchemistlabs/pal-agent-rick
        path: agents/rick
        version: 0.2.0
        revision: 4f11a2443d60392ea7a1cba7c1787348da22d023
        manifest: https://raw.githubusercontent.com/promptalchemistlabs/pal-agent-rick/main/agent.yaml
      capabilities:
        - permission-review
        - policy-enforcement
        - privacy-review
        - security-audit
      permissions:
        - read:agent-manifests
        - read:approval-policies
        - read:audit-metadata
        - write:security-decisions
        - block:unauthorised-actions
      contracts:
        accepts:
          - shared-contracts/task-request.schema.json
          - shared-contracts/approval-request.schema.json
        returns:
          - shared-contracts/task-result.schema.json
          - shared-contracts/approval-decision.schema.json
      healthcheck:
        endpoint: /health
        required: true

    - id: bastion
      displayName: Bastion
      role: system-doctor
      tier: core
      enabled: true
      removable: false
      replacementPolicy: compatible-agent-required
      source:
        repository: https://github.com/promptalchemistlabs/pal-agent-bastion
        path: agents/bastion
        version: 0.2.0
        revision: 0b5b595c2056210e85442b9a59582d8374246ca1
        manifest: https://raw.githubusercontent.com/promptalchemistlabs/pal-agent-bastion/main/agent.yaml
      capabilities:
        - agent-health-diagnosis
        - integration-diagnosis
        - infrastructure-diagnosis
        - memory-health-diagnosis
      permissions:
        - read:health-metadata
        - read:operational-logs
        - write:diagnostic-reports
        - write:recovery-recommendations
      contracts:
        accepts:
          - shared-contracts/task-request.schema.json
        returns:
          - shared-contracts/task-result.schema.json
      healthcheck:
        endpoint: /health
        required: true

  extensions: []
