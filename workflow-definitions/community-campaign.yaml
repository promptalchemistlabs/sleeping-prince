apiVersion: kingdom.pal/v1alpha1
kind: Workflow

metadata:
  id: community-campaign
  name: Governed Tembusu Circle content publication

spec:
  trigger:
    type: founder-request
  steps:
    - id: identify-need
      agent: orin
      action: accept-telegram-or-dashboard-request
      risk: low
      next: create-campaign

    - id: create-campaign
      agent: scribe
      action: create-gatsby-markdown
      risk: low
      next: security-review

    - id: security-review
      agent: rick
      action: review-gatsby-write-and-build
      risk: medium
      next: founder-approval

    - id: founder-approval
      actor: founder
      action: approve-gatsby-write-and-build
      risk: medium
      next: build-demo-site

    - id: build-demo-site
      actor: kingdom-runtime
      action: write-markdown-and-build-gatsby
      risk: medium
      next: record-outcome

    - id: record-outcome
      agent: orin
      action: record-workflow-summary
      risk: low
